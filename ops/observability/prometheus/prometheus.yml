global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    fleet: catan-zero

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: dcgm
    file_sd_configs:
      - files: [/etc/prometheus/targets/dcgm.json]
  - job_name: node
    file_sd_configs:
      - files: [/etc/prometheus/targets/node.json]
  - job_name: catan-generator
    file_sd_configs:
      - files: [/etc/prometheus/targets/catan.json]
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
