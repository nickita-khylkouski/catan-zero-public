groups:
  - name: catan-fleet
    rules:
      - alert: CatanExporterDown
        expr: up{job="catan-generator"} == 0
        for: 3m
        labels: {severity: critical}
        annotations:
          summary: "Catan exporter down on {{ $labels.box }}"
      - alert: CatanGeneratorStale
        expr: catan_fleet_generator_processes > 0 and catan_fleet_generator_progress_age_seconds > 300
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "Generator stalled on {{ $labels.host }}/gpu{{ $labels.gpu }}"
      - alert: CatanGeneratorExitedIncomplete
        expr: catan_fleet_generator_processes == 0 and catan_fleet_generator_complete == 0 and catan_fleet_generator_games_requested > 0
        for: 3m
        labels: {severity: critical}
        annotations:
          summary: "Generator exited incomplete on {{ $labels.host }}/gpu{{ $labels.gpu }}/pipeline{{ $labels.pipeline }}"
      - alert: CatanGeneratorFailure
        expr: catan_fleet_generator_failures > 0
        for: 1m
        labels: {severity: critical}
        annotations:
          summary: "Self-play failure on {{ $labels.host }}/gpu{{ $labels.gpu }}"
      - alert: CatanGeneratorRecipeMismatch
        expr: catan_fleet_generator_active == 1 and catan_fleet_generator_recipe_safe == 0
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "Unsafe A1 recipe on {{ $labels.host }}/gpu{{ $labels.gpu }}/pipeline{{ $labels.pipeline }}"
          description: "The active lane differs from the exact n128 public-information recipe; inspect catan_fleet_generator_info before retaining any output."
      - alert: CatanOutputDiskLow
        expr: catan_fleet_output_disk_free_bytes < 100 * 1024 * 1024 * 1024
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "Less than 100 GiB free on {{ $labels.host }}"
      - alert: GPUExporterDown
        expr: up{job="dcgm"} == 0
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "DCGM exporter down on {{ $labels.box }}"
      - alert: GPUIdle
        expr: |
          avg_over_time(DCGM_FI_DEV_GPU_UTIL{gpumodel="H100",role="generation"}[10m]) < 20
          and on (box, gpu)
          max by (box, gpu) (catan_fleet_generator_active == 1)
        for: 10m
        labels: {severity: critical}
        annotations:
          summary: "Active H100 generation lane is idle on {{ $labels.box }}/gpu{{ $labels.gpu }}"
