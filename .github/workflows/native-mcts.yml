name: Native MCTS wheel

on:
  pull_request:
    paths:
      - ".github/workflows/native-mcts.yml"
      - "native/catanatron-rs/**"
      - "native/gumbel_mcts_rs/**"
      - "src/catan_zero/search/**"
      - "src/catan_zero/rl/gumbel_self_play.py"
      - "tools/generate_gumbel_selfplay_data.py"
      - "tests/test_native_gumbel_hot_loop.py"
      - "tests/test_generate_native_rollout.py"
      - "tests/test_native_mcts_ci_contract.py"
      - "tests/test_native_source_closure.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/native-mcts.yml"
      - "native/catanatron-rs/**"
      - "native/gumbel_mcts_rs/**"
      - "src/catan_zero/search/**"
      - "src/catan_zero/rl/gumbel_self_play.py"
      - "tools/generate_gumbel_selfplay_data.py"
      - "tests/test_native_gumbel_hot_loop.py"
      - "tests/test_generate_native_rollout.py"
      - "tests/test_native_mcts_ci_contract.py"
      - "tests/test_native_source_closure.py"

permissions:
  contents: read

jobs:
  rust-and-cp311-wheel:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/catanatron-rs
            native/catanatron-rs/python
            native/gumbel_mcts_rs

      # These gates are deliberately independent of pytest. A missing Rust
      # toolchain or unbuildable native crate must fail, never become a skip.
      - name: Rust format
        run: |
          cargo fmt --manifest-path native/catanatron-rs/Cargo.toml --all -- --check
          cargo fmt --manifest-path native/catanatron-rs/python/Cargo.toml --all -- --check
          cargo fmt --manifest-path native/gumbel_mcts_rs/Cargo.toml --all -- --check
      - name: Rust check and test
        run: |
          cargo check --locked --manifest-path native/gumbel_mcts_rs/Cargo.toml
          cargo test --locked --manifest-path native/gumbel_mcts_rs/Cargo.toml
          cargo check --locked --manifest-path native/catanatron-rs/python/Cargo.toml
          cargo test --locked --manifest-path native/catanatron-rs/Cargo.toml

      - name: Build and install the actual CPython 3.11 wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.14.1 pytest numpy
          maturin build --locked --release \
            --manifest-path native/catanatron-rs/python/Cargo.toml \
            --interpreter python3.11 \
            --out dist-ci
          python -m pip install --force-reinstall --no-deps dist-ci/catanatron_rs-*-cp311-*.whl

      - name: Prove native symbols are present and run Python parity tests
        env:
          PYTHONPATH: src
        run: |
          python - <<'PY'
          import catanatron_rs
          assert callable(getattr(catanatron_rs, "gumbel_search", None)), (
              "built wheel omitted catanatron_rs.gumbel_search"
          )
          assert callable(getattr(catanatron_rs, "build_entity_features_flat", None)), (
              "built wheel omitted the fail-closed Rust evaluator featurizer"
          )
          PY
          python -m pytest -q \
            tests/test_native_gumbel_hot_loop.py \
            tests/test_generate_native_rollout.py \
            tests/test_native_mcts_ci_contract.py \
            tests/test_native_source_closure.py
